<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 챗봇</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      background: #fff;
      width: 480px;
      max-width: 95vw;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      height: 640px;
    }

    header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      align-self: flex-end;
      background: #2563eb;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #f3f4f6;
      color: #111;
      border-bottom-left-radius: 4px;
    }

    .bubble.loading {
      color: #9ca3af;
      font-style: italic;
    }

    .msg-row {
      display: flex;
      gap: 8px;
    }

    .msg-row.assistant { align-items: flex-start; }
    .msg-row.user      { justify-content: flex-end; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .assistant-body {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .assistant-name {
      font-size: 0.75rem;
      font-weight: 700;
      color: #374151;
    }

    .bubble-time {
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: #9ca3af;
      white-space: nowrap;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
    }

    #user-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      resize: none;
      height: 42px;
    }

    #user-input:focus { border-color: #2563eb; }

    #send-btn {
      padding: 10px 18px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>🤵 다현's 집사</header>
    <div id="messages"></div>
    <div class="input-row">
      <input id="user-input" type="text" placeholder="메시지를 입력하세요..." autocomplete="off" />
      <button id="send-btn">보내기</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    const MAX_HISTORY = 20;
    let history = [];

    function timeStr() {
      return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    }

    function addBubble(text, role) {
      const row = document.createElement("div");
      row.className = `msg-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;

      const time = document.createElement("span");
      time.className = "msg-time";
      time.textContent = timeStr();

      if (role === "assistant" || role === "assistant loading") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = "🤵";

        const body = document.createElement("div");
        body.className = "assistant-body";

        const name = document.createElement("span");
        name.className = "assistant-name";
        name.textContent = "다현's 집사";

        const bubbleTime = document.createElement("div");
        bubbleTime.className = "bubble-time";
        bubbleTime.appendChild(bubble);
        bubbleTime.appendChild(time);

        body.appendChild(name);
        body.appendChild(bubbleTime);
        row.appendChild(avatar);
        row.appendChild(body);
      } else {
        const bubbleTime = document.createElement("div");
        bubbleTime.className = "bubble-time";
        bubbleTime.appendChild(time);
        bubbleTime.appendChild(bubble);
        row.appendChild(bubbleTime);
      }

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function send() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      sendBtn.disabled = true;

      history.push({ role: "user", content: message });
      if (history.length > MAX_HISTORY) history = history.slice(-MAX_HISTORY);

      addBubble(message, "user");
      const loadingBubble = addBubble("답변 중...", "assistant loading");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: history }),
        });
        const data = await res.json();
        const reply = data.reply || data.error || "오류 발생";

        loadingBubble.textContent = reply;
        loadingBubble.classList.remove("loading");

        history.push({ role: "assistant", content: reply });
        if (history.length > MAX_HISTORY) history = history.slice(-MAX_HISTORY);
      } catch {
        loadingBubble.textContent = "서버 연결 실패";
        loadingBubble.classList.remove("loading");
        history.pop();
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
  </script>
</body>
</html>
